<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>欢迎使用优调鞋业库存管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei, sans-serif;}
html,body{height:100%;background:#f5f7fa;color:#333;overflow-x:hidden;}
.login-container{width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#f5f7fa;}
.login-box{max-width:420px;width:100%;background:#fff;border-radius:12px;padding:40px 30px;box-shadow:0 2px 12px rgba(0,0,0,0.08);}
.login-box h2{text-align:center;margin-bottom:25px;font-size:20px;color:#333;}
.form-item{margin-bottom:18px;}
.form-item label{display:block;margin-bottom:6px;font-size:14px;color:#555;}
.form-item input{width:100%;padding:12px;background:#f9f9f9;border:1px solid #ddd;border-radius:6px;color:#333;outline:none;}
.login-btn{width:100%;padding:13px;background:#409eff;border:none;border-radius:6px;color:#fff;font-size:15px;cursor:pointer;}
.sidebar{width:170px;height:100vh;background:#fff;position:fixed;top:0;left:0;padding:20px 10px;display:none;flex-direction:column;gap:8px;z-index:99;border-right:1px solid #eee;}
.sidebar .user-info{padding:12px;text-align:center;font-size:14px;font-weight:bold;color:#409eff;}
.sidebar a{padding:11px;text-align:center;background:#f8f9fa;border-radius:6px;color:#333;cursor:pointer;font-size:14px;}
.sidebar a:hover{background:#e8f3ff;color:#409eff;}
.sidebar .logout{margin-top:auto;background:#fff5f5;color:#f56c6c;}
.main{margin-left:170px;height:100vh;display:none;background:#f5f7fa;}
.main iframe{width:100%;height:100%;border:none;background:#f5f7fa;}
@media(max-width:768px){
  .sidebar{width:100%;height:auto;flex-direction:row;flex-wrap:wrap;padding:10px;}
  .sidebar .user-info{width:100%;}
  .sidebar a{flex:1;min-width:90px;padding:8px 4px;font-size:13px;}
  .main{margin-left:0;margin-top:160px;height:calc(100vh - 160px);}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
<div class="sidebar" id="sidebar">
  <div class="user-info" id="showUser"></div>
  <a onclick="go('product.html')">产品登记</a>
  <a onclick="go('rk.html')">入库管理</a>
  <a onclick="go('ck.html')">出库管理</a>
  <a onclick="go('kc.html')">库存查看</a>
  <a onclick="go('#')" id="menuUser" style="display:none">人员配置</a>
  <a onclick="go('#')" id="menuTable" style="display:none">表结构查看</a>
  <a class="logout" onclick="logout()">退出登录</a>
</div>
<div class="login-container" id="loginBox">
  <div class="login-box">
    <h2>欢迎使用优调鞋业库存管理系统</h2>
    <div class="form-item">
      <label>账号</label>
      <input id="account" placeholder="请输入账号">
    </div>
    <div class="form-item">
      <label>密码</label>
      <input type="password" id="pwd" placeholder="请输入密码">
    </div>
    <button class="login-btn" onclick="login()">登录</button>
  </div>
</div>
<div class="main" id="main">
  <iframe id="iframe"></iframe>
</div>
<script>
const GITHUB = {
  owner: "你的GitHub用户名",
  repo: "仓库名",
  token: "你的GitHub_TOKEN",
  path: ""
};
let timer;
const EXPIRE = 10*60*1000;
async function getExcel(file){
  const url = `https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${GITHUB.path}${file}`;
  const {data:meta} = await axios.get(url,{headers:{Authorization:`token ${GITHUB.token}`}});
  const bstr = atob(meta.content.replace(/\s/g,''));
  const u8 = new Uint8Array(bstr.length);
  for(let i=0;i<bstr.length;i++)u8[i]=bstr.charCodeAt(i);
  const wb = XLSX.read(u8);
  return {data:XLSX.utils.sheet_to_json(wb.Sheets.Sheet1), sha:meta.sha};
}
async function saveExcel(file,data,sha){
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(data),"Sheet1");
  const u8=XLSX.write(wb,{bookType:"xlsx",type:"array"});
  const bstr=btoa(String.fromCharCode(...u8));
  await axios.put(`https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${GITHUB.path}${file}`,{
    message:"update",content:bstr,sha
  },{headers:{Authorization:`token ${GITHUB.token}`}});
}
async function login(){
  let account=document.getElementById("account").value.trim();
  let pwd=document.getElementById("pwd").value.trim();
  if(!account||!pwd)return alert("请输入账号密码");
  try{
    const {data}=await getExcel("ytxy_role.xlsx");
    const user=data.find(u=>u["账号"]==account&&u["密码"]==pwd);
    if(!user)return alert("账号或密码错误");
    localStorage.user=JSON.stringify(user);
    localStorage.loginTime=Date.now();
    showSystem(user);
    resetTimer();
  }catch(e){alert("GitHub读取失败");}
}
function showSystem(user){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("sidebar").style.display="flex";
  document.getElementById("main").style.display="block";
  document.getElementById("showUser").innerText=user["名字"];
  if(user["角色"]=="超级管理员"){
    document.getElementById("menuUser").style.display="block";
    document.getElementById("menuTable").style.display="block";
  }
  go("product.html");
}
function go(url){document.getElementById("iframe").src=url;}
function logout(){localStorage.clear();location.reload();}
function resetTimer(){clearTimeout(timer);timer=setTimeout(()=>{alert("登录已超时");logout();},EXPIRE);}
document.addEventListener("mousemove",resetTimer);
document.addEventListener("keydown",resetTimer);
window.onload=()=>{
  let u=localStorage.user;let t=localStorage.loginTime;
  if(!u||!t)return;
  if(Date.now()-t>EXPIRE){localStorage.clear();alert("登录已超时");return;}
  showSystem(JSON.parse(u));resetTimer();
}
</script>
</body>
</html>
